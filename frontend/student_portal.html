<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cổng Sinh Viên - QRAttend</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Header Navbar -->
  <header class="navbar">
    <div class="nav-brand">
      <div class="nav-brand-logo"><i class="fa-solid fa-graduation-cap"></i></div>
      <span>QRAttend Student Portal</span>
    </div>
    <div class="nav-user">
      <span class="nav-username"><i class="fa-solid fa-user-graduate"></i> Sinh viên: <strong id="student-name">Sinh viên</strong></span>
      <button class="btn-logout" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</button>
    </div>
  </header>

  <div class="container" style="max-width: 900px;">
    <!-- Brand Slogan / Header -->
    <div style="margin-bottom: 30px;">
      <h2 style="font-size: 22px; font-weight: 800; color: var(--text-primary); margin-bottom: 5px;">🎒 Lớp học phần đang tham gia</h2>
      <p style="color: var(--text-secondary); font-size: 13.5px; font-weight: 550;">Nhấp chọn một lớp học để xem lịch sử điểm danh cá nhân chi tiết.</p>
    </div>

    <!-- Danh sách Lớp Học Phần Grid -->
    <div id="classes-list-container" class="class-grid">
      <!-- Chèn các class-card động bằng JS -->
      <p style="text-align: center; color: var(--text-secondary); width: 100%;">Đang tải dữ liệu lớp học phần...</p>
    </div>
  </div>

  <!-- ================= POPUP MODAL ================= -->
  
  <!-- Modal: Xem Lịch Sử Điểm Danh Lớp Học Phần -->
  <div id="modal-class-history" class="modal-overlay">
    <div class="modal-content" style="max-width: 650px; max-height: 85vh; overflow-y: auto;">
      <div class="modal-header">
        <h3 class="modal-title" id="history-modal-title">Lịch sử điểm danh môn:</h3>
        <button class="modal-close" onclick="closeModal('modal-class-history')">&times;</button>
      </div>

      <div class="table-wrapper">
        <table class="custom-table">
          <thead>
            <tr>
              <th>Buổi học</th>
              <th>Ngày học</th>
              <th>Trạng thái</th>
              <th>Thời gian quét</th>
              <th>Hình thức</th>
            </tr>
          </thead>
          <tbody id="history-table-body">
            <!-- Chèn động bằng JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="student_portal.js"></script>
</body>
</html>
