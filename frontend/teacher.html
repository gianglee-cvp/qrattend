<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng Điều Khiển Giáo Viên</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 600px;">
    <a href="index.html" class="btn btn-sm btn-outline-secondary mb-4 rounded-pill">⬅ Quay lại trang chủ</a>
    <h1 class="mb-4">Dashboard <span>Giáo Viên</span></h1>
    
    <div class="card mb-4 border-0 shadow-sm p-4 rounded-4">
      <h3 class="h5 mb-3 fw-bold text-primary">📢 Tạo mã QR điểm danh</h3>
      <input type="text" id="sessionId" class="form-control mb-3" placeholder="Nhập mã buổi học (VD: CS101)">
      <button class="btn btn-primary btn-lg w-100 fw-bold" onclick="generateQR()">Tạo mã QR</button>
      <div id="qrcode" class="mt-4 text-center d-flex flex-column align-items-center"></div>
    </div>

    <div class="card border-0 shadow-sm p-4 rounded-4">
      <h3 class="h5 mb-3 fw-bold text-success">📊 Xem báo cáo điểm danh</h3>
      <input type="text" id="statSessionId" class="form-control mb-3" placeholder="Nhập mã buổi học (VD: CS101)">
      <button class="btn btn-outline-success w-100 fw-bold" onclick="getStatistics()">Xem danh sách chi tiết</button>
      <div id="statistics" class="mt-4"></div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
  <script src="config.js"></script>
  <script src="teacher.js"></script>
</body>
</html>
