<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Điểm Danh Sinh Viên - QRAttend</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container container-narrow" style="margin-top: 40px;">
    <!-- Brand Header -->
    <div class="header-brand">
      <div class="logo-icon">
        <i class="fa-solid fa-qrcode"></i>
      </div>
      <h1>QRAttend</h1>
      <p>Hệ thống Điểm danh Sinh viên</p>
    </div>

    <!-- Student Attendance Card -->
    <div class="premium-card">
      <h2 style="font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 20px; color: var(--text-primary);">
        <i class="fa-solid fa-circle-check" style="color: var(--success);"></i> Xác Nhận Điểm Danh
      </h2>

      <!-- Thông tin lớp học phần (Chỉ hiện khi có Session) -->
      <div id="class-info-box" class="alert alert-success" style="display: none; flex-direction: column; align-items: flex-start; gap: 4px; margin-bottom: 20px;">
        <span style="font-size: 11px; font-weight: 800; opacity: 0.7; text-transform: uppercase;">LỚP HỌC PHẦN</span>
        <strong id="display-subject-name" style="font-size: 16px;">Tên môn học</strong>
        <span style="font-size: 12.5px; opacity: 0.8;" id="display-class-id">Mã lớp: </span>
      </div>

      <!-- Form Nhập mã buổi học nếu chưa quét QR hoặc bị lỗi link -->
      <div id="session-input-box" class="form-group">
        <label class="form-label" for="manualSessionId">Hoặc nhập mã buổi học nhận từ Giảng viên:</label>
        <div class="input-container" style="display: flex; gap: 10px;">
          <div style="position: relative; flex-grow: 1;">
            <span class="input-icon"><i class="fa-solid fa-key"></i></span>
            <input type="text" id="manualSessionId" class="form-input" placeholder="Ví dụ: SESS_123456">
          </div>
          <button type="button" class="btn-primary" style="width: auto; padding: 12px 20px;" onclick="loadSessionManual()">Tìm</button>
        </div>
      </div>

      <!-- Phần Điểm danh (Chỉ hiện khi đã tải thành công Session Info) -->
      <div id="attendance-fields" style="display: none;">
        <!-- Dropdown / Autocomplete Chọn Tên và MSSV -->
        <div class="form-group autocomplete-container">
          <label class="form-label">Tìm kiếm Tên hoặc MSSV của bạn:</label>
          <div class="input-container">
            <span class="input-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input type="text" id="student-search-input" class="form-input" placeholder="Gõ tên hoặc MSSV để chọn..." oninput="onSearchInput(this)" onfocus="onSearchInput(this)">
          </div>
          <!-- Danh sách gợi ý Autocomplete bay lơ lửng -->
          <div id="suggestion-box" class="suggestion-list" style="display: none;">
            <!-- Gợi ý chèn động bằng JS -->
          </div>
          <input type="hidden" id="studentId">
        </div>

        <!-- Chụp ảnh chân dung Selfie -->
        <div class="form-group" style="text-align: center; margin: 25px 0;">
          <label class="btn-primary" style="background: rgba(255, 255, 255, 0.05); border: 1.5px dashed rgba(255, 255, 255, 0.15); color: var(--text-primary); cursor: pointer; box-shadow: none;">
            <i class="fa-solid fa-camera" style="color: var(--primary);"></i> &nbsp; Chụp Ảnh Chân Dung
            <input type="file" id="photoInput" accept="image/*" capture="user" style="display:none" onchange="handlePhotoSelection(this)">
          </label>
          
          <div id="photoPreview" style="display:none; margin-top: 15px;">
            <div class="camera-box" style="height: auto; max-height: 250px;">
              <img id="previewImg" style="width:100%; height: auto; display: block;" alt="Ảnh selfie của bạn">
            </div>
            <p style="color: var(--success); font-weight: 700; font-size: 13.5px; margin-top: 8px;">✓ Chụp ảnh thành công!</p>
          </div>
        </div>

        <!-- Nút Xác Nhận Điểm Danh -->
        <button class="btn-primary" id="btn-submit-attendance" onclick="submitAttendance()">
          <i class="fa-solid fa-circle-check"></i> Xác Nhận Điểm Danh
        </button>
      </div>

      <!-- Alert Result -->
      <div id="result-alert" class="alert" style="display: none;">
        <i class="fa-solid fa-circle-info"></i>
        <span id="result-message">Kết quả điểm danh</span>
      </div>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="student.js"></script>
</body>
</html>
