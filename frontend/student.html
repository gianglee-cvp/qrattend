<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Điểm Danh Sinh Viên</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 500px;">
    <a href="index.html" class="btn btn-sm btn-outline-secondary mb-4 rounded-pill">⬅ Quay lại trang chủ</a>
    <h1 class="mb-4 text-center">Xác Nhận <span>Điểm Danh</span></h1>
    
    <div class="card shadow-sm border-0 p-4 rounded-4">
      <!-- Khu vực quét mã QR -->
      <div id="reader" class="mb-2 shadow-sm" style="width:100%; aspect-ratio: 16/9; background: #e9ecef; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed #dee2e6;">
        <p class="text-muted small fw-medium">Đang chờ camera quét QR...</p>
      </div>
      
      <div class="form-floating mb-4">
        <input type="text" id="manualSessionId" class="form-control" placeholder="Mã buổi học">
        <label for="manualSessionId">Hoặc nhập tay Mã buổi học tại đây</label>
      </div>

      <div class="mb-4 text-center">
        <label class="btn btn-outline-primary w-100 py-3 mb-2 fw-bold shadow-sm">
          📸 BẤM ĐỂ CHỤP ẢNH CHÂN DUNG
          <input type="file" id="photoInput" accept="image/*" capture="user" style="display:none" onchange="handlePhotoSelection(this)">
        </label>
        <div id="photoPreview" class="mt-3 text-center" style="display:none">
          <img id="previewImg" style="width:100%; max-height: 250px; object-fit: cover; border-radius: 12px;" class="shadow-sm border">
          <p class="text-success fw-bold mt-2 mb-0">✓ Đã đính kèm ảnh thành công!</p>
        </div>
      </div>

      <div class="form-floating mb-3">
        <input type="text" id="studentName" class="form-control" placeholder="Họ và tên">
        <label for="studentName">Họ và tên</label>
      </div>
      <div class="form-floating mb-4">
        <input type="text" id="studentId" class="form-control" placeholder="MSSV">
        <label for="studentId">Mã số sinh viên (MSSV)</label>
      </div>
      
      <button class="btn btn-success btn-lg w-100 py-3 fw-bold shadow" onclick="submitAttendance()">XÁC NHẬN ĐIỂM DANH</button>
      <div id="result" class="mt-4"></div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="config.js"></script>
  <script src="student.js"></script>
</body>
</html>
